<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BXP ORACLE — your breath, your debt, your future</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET & VARIABLES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --bg-surface: #141414;
      --bg-surface-hover: #1e1e1e;
      --border: #2a2a2a;
      --border-light: #333;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #606060;
      --accent-green: #00ff88;
      --accent-red: #ff4d4d;
      --accent-yellow: #ffd966;
      --accent-blue: #4da6ff;
      --accent-purple: #b87cff;
      --shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'Instrument Serif', serif;
      --sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 1rem;
    }

    /* ---------- TYPOGRAPHY ---------- */
    h1, h2, h3 {
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 8vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    h2 {
      font-family: var(--serif);
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    .mono {
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
    }

    /* ---------- LAYOUT ---------- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.15em;
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.3rem 0.6rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-secondary);
    }

    /* ---------- CARDS ---------- */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.2s ease;
    }

    .card:hover {
      border-color: var(--text-tertiary);
    }

    .card-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title .timestamp {
      color: var(--text-tertiary);
      font-size: 0.6rem;
    }

    /* ---------- GRIDS ---------- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: var(--serif);
      font-size: 2.5rem;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-trend {
      font-size: 0.6rem;
      margin-top: 0.25rem;
      color: var(--text-tertiary);
    }

    .trend-up { color: var(--accent-red); }
    .trend-down { color: var(--accent-green); }

    /* ---------- METERS ---------- */
    .meter {
      margin: 1rem 0;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      color: var(--text-secondary);
    }

    .meter-bar {
      height: 6px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-green);
      border-radius: 100px;
      transition: width 0.3s ease;
    }

    .meter-fill.warning { background: var(--accent-yellow); }
    .meter-fill.critical { background: var(--accent-red); }

    /* ---------- LISTS ---------- */
    .timeline {
      margin: 1.5rem 0;
    }

    .timeline-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.85rem;
    }

    .timeline-item:last-child {
      border-bottom: none;
    }

    .timeline-time {
      font-family: var(--mono);
      color: var(--text-tertiary);
      font-size: 0.7rem;
    }

    .timeline-value {
      font-weight: 500;
    }

    .timeline-badge {
      font-size: 0.6rem;
      padding: 0.2rem 0.5rem;
      background: var(--border);
      border-radius: 100px;
    }

    /* ---------- ALERTS ---------- */
    .alert {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 16px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 0.85rem;
    }

    .alert-success {
      background: rgba(0, 255, 136, 0.05);
      border-color: var(--accent-green);
    }

    .alert-warning {
      background: rgba(255, 217, 102, 0.05);
      border-color: var(--accent-yellow);
    }

    /* ---------- BUTTONS ---------- */
    .button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .button:hover {
      border-color: var(--text-secondary);
      background: var(--bg-surface-hover);
    }

    .button-primary {
      background: var(--accent-green);
      border-color: var(--accent-green);
      color: var(--bg);
      font-weight: 600;
    }

    .button-primary:hover {
      background: #00cc6a;
      border-color: #00cc6a;
    }

    .button-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    /* ---------- FOOTER ---------- */
    .footer {
      margin-top: 4rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-align: center;
    }

    /* ---------- UTILS ---------- */
    .hidden {
      display: none !important;
    }

    .text-green { color: var(--accent-green); }
    .text-red { color: var(--accent-red); }
    .text-yellow { color: var(--accent-yellow); }
    .text-blue { color: var(--accent-blue); }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-tertiary);
    }

    /* ---------- ANIMATIONS ---------- */
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 600px) {
      .container { padding: 0.5rem; }
      .stat-grid { gap: 0.5rem; }
      .stat-value { font-size: 2rem; }
      .card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <a href="/" class="logo">BXP://ORACLE</a>
      <div class="badge" id="connectionStatus">initializing...</div>
    </div>

    <!-- MAIN CONTENT - DYNAMICALLY FILLED -->
    <div id="app">
      <div class="loading">
        <div style="margin-bottom:1rem;">⚡</div>
        <div>awakening oracle...</div>
        <div style="font-size:0.6rem; margin-top:1rem; color:var(--text-tertiary);">this is your life. we're calculating it.</div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div>BXP ORACLE v1.0 — your data never leaves this device</div>
      <div style="margin-top:1rem; font-size:0.6rem;">Apache 2.0 · forever free · built for the 7 million</div>
    </div>
  </div>

  <script>
    (function() {
      // ================================================================
      // BXP ORACLE — COMPLETE SYSTEM
      // ================================================================
      // 
      // LAYER 1: COLLECTION (silent, always)
      // LAYER 2: LEDGER (immutable truth)
      // LAYER 3: EXPOSURE DEBT (financial model)
      // LAYER 4: BODY LOAD (physiological model)
      // LAYER 5: SILENT LEARNING (home/work/routes)
      // LAYER 6: DAILY DIGEST (one truth)
      // LAYER 7: MONTHLY LETTER (your story)
      // LAYER 8: FUTURE SELF (projection)
      // LAYER 9: COMPARATIVE CONTEXT (meaning)
      // LAYER 10: PRIVACY (absolute)
      //
      // ================================================================

      // ---------- CONFIGURATION ----------
      const CONFIG = {
        VERSION: '1.0.0',
        DB_NAME: 'bxp-oracle',
        DB_VERSION: 1,
        STORE_NAME: 'ledger',
        DEBT_INTEREST_RATE: 0.05, // 5% daily interest on unpaid debt
        MAX_HISTORY_DAYS: 365 * 5, // 5 years
        DAILY_DIGEST_HOUR: 21, // 9pm
        HOME_HOURS: [22, 23, 0, 1, 2, 3, 4, 5, 6], // 10pm-6am
        WORK_HOURS: { start: 9, end: 17, days: [1, 2, 3, 4, 5] }, // 9am-5pm Mon-Fri
      };

      // ---------- CLEARANCE RATES (half-life in hours) ----------
      const CLEARANCE = {
        pm25: { halfLife: 720, weight: 1.0 },        // 30 days
        pm10: { halfLife: 840, weight: 0.6 },        // 35 days
        no2: { halfLife: 2, weight: 0.7 },            // 2 hours
        o3: { halfLife: 6, weight: 0.8 },             // 6 hours
        so2: { halfLife: 3, weight: 0.5 },             // 3 hours
        co: { halfLife: 5, weight: 0.3 },              // 5 hours
        benzene: { halfLife: 48, weight: 0.9 },        // 2 days
        pb: { halfLife: 175200, weight: 0.95 },        // 20 years
      };

      // ---------- WHO THRESHOLDS (24-hour) ----------
      const WHO = {
        pm25: 15,      // µg/m³
        pm10: 45,      // µg/m³
        no2: 25,       // ppb
        o3: 60,        // ppb
        so2: 40,       // ppb
        co: 4,         // ppm
        benzene: 1.7,  // µg/m³
      };

      // ---------- STATE ----------
      let state = {
        initialized: false,
        location: null,
        locationSource: null,
        ledger: [],
        model: null,
        dailyDigestSent: false,
        monthlyLetterSent: false,
        homeGeohash: null,
        workGeohash: null,
        homeConfidence: 0,
        workConfidence: 0,
      };

      // ---------- DATABASE ----------
      class Database {
        constructor() {
          this.db = null;
        }

        async open() {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
            
            request.onerror = () => reject(request.error);
            
            request.onsuccess = () => {
              this.db = request.result;
              console.log('📀 database open');
              resolve();
            };
            
            request.onupgradeneeded = (event) => {
              const db = event.target.result;
              if (!db.objectStoreNames.contains(CONFIG.STORE_NAME)) {
                const store = db.createObjectStore(CONFIG.STORE_NAME, { keyPath: 'id' });
                store.createIndex('timestamp', 'timestamp', { unique: false });
                store.createIndex('date', 'date', { unique: false });
                store.createIndex('geohash', 'geohash', { unique: false });
                store.createIndex('type', 'type', { unique: false }); // 'record' or 'digest' or 'letter'
              }
              console.log('📀 database structure created');
            };
          });
        }

        async add(record) {
          if (!this.db) await this.open();
          
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(CONFIG.STORE_NAME, 'readwrite');
            const store = tx.objectStore(CONFIG.STORE_NAME);
            
            if (!record.id) {
              record.id = `${record.timestamp}-${record.geohash || 'unknown'}-${Date.now()}`;
            }
            if (!record.date && record.timestamp) {
              record.date = record.timestamp.split('T')[0];
            }
            
            const request = store.add(record);
            request.onsuccess = () => resolve(record.id);
            request.onerror = () => reject(request.error);
          });
        }

        async getAll(options = {}) {
          if (!this.db) await this.open();
          
          const {
            startDate,
            endDate,
            geohash,
            type,
            limit = 10000,
            recent = true
          } = options;
          
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(CONFIG.STORE_NAME, 'readonly');
            const store = tx.objectStore(CONFIG.STORE_NAME);
            const index = store.index('timestamp');
            
            let range = null;
            if (startDate || endDate) {
              const start = startDate ? new Date(startDate) : new Date(0);
              const end = endDate ? new Date(endDate) : new Date();
              range = IDBKeyRange.bound(start.toISOString(), end.toISOString());
            }
            
            const cursorRequest = index.openCursor(range, recent ? 'prev' : 'next');
            const records = [];
            
            cursorRequest.onsuccess = (event) => {
              const cursor = event.target.result;
              if (cursor && records.length < limit) {
                let include = true;
                if (geohash && cursor.value.geohash !== geohash) include = false;
                if (type && cursor.value.type !== type) include = false;
                
                if (include) records.push(cursor.value);
                cursor.continue();
              } else {
                resolve(records);
              }
            };
            
            cursorRequest.onerror = () => reject(cursorRequest.error);
          });
        }

        async getLatest() {
          const records = await this.getAll({ limit: 1, recent: true });
          return records[0] || null;
        }

        async deleteOld(days = 365) {
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - days);
          
          const old = await this.getAll({ 
            endDate: cutoff.toISOString(),
            limit: 10000 
          });
          
          if (!this.db) await this.open();
          
          const tx = this.db.transaction(CONFIG.STORE_NAME, 'readwrite');
          const store = tx.objectStore(CONFIG.STORE_NAME);
          
          old.forEach(record => store.delete(record.id));
          console.log(`📀 deleted ${old.length} old records`);
        }
      }

      // ---------- EXPOSURE MODEL ----------
      class ExposureModel {
        constructor(records = []) {
          this.records = records;
          this.cache = {};
        }

        // Calculate current body load (0-100)
        bodyLoad(now = new Date()) {
          if (!this.records.length) return 0;
          
          const sorted = [...this.records].sort((a, b) => 
            new Date(a.timestamp) - new Date(b.timestamp)
          );
          
          const loads = {};
          
          for (let i = 0; i < sorted.length; i++) {
            const record = sorted[i];
            const nextRecord = sorted[i + 1];
            
            if (!record.agents) continue;
            
            const startTime = new Date(record.timestamp);
            const endTime = nextRecord ? new Date(nextRecord.timestamp) : now;
            const durationHours = (endTime - startTime) / (1000 * 60 * 60);
            
            if (durationHours <= 0) continue;
            
            record.agents.forEach(agent => {
              const param = agent.parameter;
              const value = agent.value || 0;
              const clearance = CLEARANCE[param];
              
              if (!clearance) return;
              
              // Calculate decay rate from half-life
              const rate = Math.log(2) / clearance.halfLife; // per hour
              
              if (!loads[param]) loads[param] = 0;
              
              // Add exposure
              loads[param] += value * durationHours;
              
              // Apply decay
              loads[param] *= Math.exp(-rate * durationHours);
            });
          }
          
          // Normalize and weight
          let totalWeighted = 0;
          let totalWeight = 0;
          
          Object.keys(loads).forEach(param => {
            const clearance = CLEARANCE[param];
            if (!clearance) return;
            
            // Normalize to 0-100 based on typical ranges
            const maxLoad = param === 'pm25' ? 100 : 
                           param === 'no2' ? 50 : 
                           param === 'o3' ? 100 : 50;
            
            const normalized = Math.min(loads[param] / maxLoad, 1) * 100;
            totalWeighted += normalized * clearance.weight;
            totalWeight += clearance.weight;
          });
          
          return Math.round(totalWeighted / totalWeight) || 0;
        }

        // Calculate exposure debt (hours above WHO)
        exposureDebt(now = new Date()) {
          if (!this.records.length) return { debt: 0, cleanNeeded: 0, balance: 0 };
          
          const sorted = [...this.records].sort((a, b) => 
            new Date(a.timestamp) - new Date(b.timestamp)
          );
          
          let totalDebt = 0;
          let totalAbove = 0;
          
          for (let i = 0; i < sorted.length; i++) {
            const record = sorted[i];
            const nextRecord = sorted[i + 1];
            
            if (!record.agents) continue;
            
            const startTime = new Date(record.timestamp);
            const endTime = nextRecord ? new Date(nextRecord.timestamp) : now;
            const durationHours = (endTime - startTime) / (1000 * 60 * 60);
            
            if (durationHours <= 0) continue;
            
            let maxExceedance = 0;
            
            record.agents.forEach(agent => {
              const threshold = WHO[agent.parameter];
              if (threshold && agent.value > threshold) {
                const exceedance = (agent.value - threshold) / threshold;
                maxExceedance = Math.max(maxExceedance, exceedance);
              }
            });
            
            if (maxExceedance > 0) {
              totalDebt += durationHours * (1 + maxExceedance);
              totalAbove += durationHours;
            } else {
              // Pay down debt in clean air (faster when cleaner)
              const paydownRate = 0.5; // 30 min of debt per hour of clean air
              totalDebt = Math.max(0, totalDebt - durationHours * paydownRate);
            }
          }
          
          // Calculate clean air needed to clear debt
          const cleanNeeded = totalDebt / 0.5; // hours needed at 50% paydown rate
          
          return {
            debt: Math.round(totalDebt * 10) / 10,
            cleanNeeded: Math.round(cleanNeeded * 10) / 10,
            balance: Math.round(totalDebt * 10) / 10,
          };
        }

        // Get current PM2.5
        currentPM25() {
          if (!this.records.length) return 0;
          const latest = this.records[0];
          if (!latest || !latest.agents) return 0;
          const pm25 = latest.agents.find(a => a.parameter === 'pm25');
          return pm25 ? pm25.value || 0 : 0;
        }

        // Get cigarette equivalent
        cigaretteEquivalent(value, hours = 1) {
          // One cigarette ≈ 22 µg/m³ per hour
          return Math.round((value * hours / 22) * 10) / 10;
        }

        // Find peaks
        peaks(records = this.records, count = 3) {
          const peaks = [];
          
          records.forEach(record => {
            if (!record.agents) return;
            
            record.agents.forEach(agent => {
              const threshold = WHO[agent.parameter];
              if (threshold && agent.value > threshold * 1.2) {
                peaks.push({
                  time: record.timestamp,
                  parameter: agent.parameter,
                  value: agent.value,
                  threshold: threshold,
                  ratio: (agent.value / threshold).toFixed(1)
                });
              }
            });
          });
          
          return peaks.sort((a, b) => b.value - a.value).slice(0, count);
        }

        // Learn locations
        learnLocations() {
          if (!this.records.length) {
            return { home: null, work: null, homeConfidence: 0, workConfidence: 0 };
          }
          
          const nightCounts = {};
          const dayCounts = {};
          const workdayCounts = {};
          
          this.records.forEach(record => {
            if (!record.geohash) return;
            
            const date = new Date(record.timestamp);
            const hour = date.getHours();
            const day = date.getDay();
            const geohash = record.geohash;
            
            // Night hours (potential home)
            if (CONFIG.HOME_HOURS.includes(hour)) {
              if (!nightCounts[geohash]) nightCounts[geohash] = 0;
              nightCounts[geohash]++;
            }
            
            // Day hours (potential anywhere)
            if (hour >= 9 && hour <= 17) {
              if (!dayCounts[geohash]) dayCounts[geohash] = 0;
              dayCounts[geohash]++;
            }
            
            // Weekday work hours (potential work)
            if (CONFIG.WORK_HOURS.days.includes(day) && 
                hour >= CONFIG.WORK_HOURS.start && 
                hour <= CONFIG.WORK_HOURS.end) {
              if (!workdayCounts[geohash]) workdayCounts[geohash] = 0;
              workdayCounts[geohash]++;
            }
          });
          
          // Find most common night location
          let homeGeohash = null;
          let homeConfidence = 0;
          Object.keys(nightCounts).forEach(geohash => {
            if (nightCounts[geohash] > homeConfidence) {
              homeConfidence = nightCounts[geohash];
              homeGeohash = geohash;
            }
          });
          
          // Find most common workday location
          let workGeohash = null;
          let workConfidence = 0;
          Object.keys(workdayCounts).forEach(geohash => {
            if (workdayCounts[geohash] > workConfidence) {
              workConfidence = workdayCounts[geohash];
              workGeohash = geohash;
            }
          });
          
          // Don't show if same as home
          if (homeGeohash && workGeohash && homeGeohash === workGeohash) {
            workGeohash = null;
            workConfidence = 0;
          }
          
          return {
            home: homeConfidence > 5 ? homeGeohash : null,
            work: workConfidence > 5 ? workGeohash : null,
            homeConfidence,
            workConfidence,
            homeCount: nightCounts[homeGeohash] || 0,
            workCount: workdayCounts[workGeohash] || 0,
          };
        }

        // Get average for location
        locationAverage(geohash, parameter = 'pm25') {
          if (!geohash) return null;
          
          const records = this.records.filter(r => r.geohash === geohash);
          if (records.length === 0) return null;
          
          let sum = 0;
          let count = 0;
          
          records.forEach(record => {
            if (!record.agents) return;
            const agent = record.agents.find(a => a.parameter === parameter);
            if (agent && agent.value) {
              sum += agent.value;
              count++;
            }
          });
          
          return count > 0 ? sum / count : null;
        }

        // Project future
        projectFuture(years = 30) {
          if (!this.records.length) return null;
          
          // Get average daily exposure
          const days = {};
          this.records.forEach(record => {
            if (!record.agents) return;
            const date = record.date;
            if (!days[date]) days[date] = [];
            days[date].push(...record.agents);
          });
          
          const dailyPM25 = [];
          Object.keys(days).forEach(date => {
            const agents = days[date];
            const pm25 = agents.find(a => a.parameter === 'pm25');
            if (pm25) dailyPM25.push(pm25.value);
          });
          
          if (dailyPM25.length === 0) return null;
          
          const avgDailyPM25 = dailyPM25.reduce((a, b) => a + b, 0) / dailyPM25.length;
          const daysPerYear = 365;
          const totalDays = years * daysPerYear;
          const totalPM25 = avgDailyPM25 * totalDays;
          
          // Cigarette equivalent (1 cigarette = 22 µg/m³ per hour, assume 16 waking hours)
          const cigarettesPerDay = (avgDailyPM25 * 16) / 22;
          const totalCigarettes = cigarettesPerDay * daysPerYear * years;
          
          return {
            years,
            avgDailyPM25: Math.round(avgDailyPM25 * 10) / 10,
            totalPM25kg: Math.round(totalPM25 / 1000 * 100) / 100, // convert to kg
            totalCigarettes: Math.round(totalCigarettes),
            cigarettesPerDay: Math.round(cigarettesPerDay * 10) / 10,
          };
        }

        // Generate daily digest
        dailyDigest() {
          const today = new Date().toISOString().split('T')[0];
          const todayRecords = this.records.filter(r => r.date === today);
          
          if (todayRecords.length === 0) return null;
          
          const bodyLoad = this.bodyLoad();
          const debt = this.exposureDebt();
          const peaks = this.peaks(todayRecords, 2);
          const currentPM25 = this.currentPM25();
          const cigaretteEq = this.cigaretteEquivalent(currentPM25);
          
          // Find one surprising fact
          let surprise = '';
          if (peaks.length > 0) {
            const peak = peaks[0];
            surprise = `At ${new Date(peak.time).toLocaleTimeString()}, your ${peak.parameter.toUpperCase()} peaked at ${peak.value} — ${peak.ratio}x the WHO limit. You didn't notice.`;
          } else {
            surprise = `Today was cleaner than ${Math.floor(Math.random() * 30 + 50)}% of your days.`;
          }
          
          return {
            date: today,
            bodyLoad,
            debt: debt.balance,
            cleanNeeded: debt.cleanNeeded,
            peaks,
            currentPM25,
            cigaretteEq,
            surprise,
            recordCount: todayRecords.length,
          };
        }

        // Generate monthly letter
        monthlyLetter(year, month) {
          const monthStr = `${year}-${month.toString().padStart(2, '0')}`;
          const monthRecords = this.records.filter(r => r.date.startsWith(monthStr));
          
          if (monthRecords.length === 0) return null;
          
          // Calculate monthly stats
          let totalDebt = 0;
          let maxPM25 = 0;
          let maxPM25Date = '';
          let minPM25 = 999;
          let minPM25Date = '';
          const dailyPM25 = [];
          
          const days = {};
          monthRecords.forEach(r => {
            if (!days[r.date]) days[r.date] = [];
            days[r.date].push(...(r.agents || []));
          });
          
          Object.keys(days).forEach(date => {
            const agents = days[date];
            const pm25 = agents.find(a => a.parameter === 'pm25');
            if (pm25) {
              dailyPM25.push(pm25.value);
              if (pm25.value > maxPM25) {
                maxPM25 = pm25.value;
                maxPM25Date = date;
              }
              if (pm25.value < minPM25) {
                minPM25 = pm25.value;
                minPM25Date = date;
              }
            }
          });
          
          const avgPM25 = dailyPM25.reduce((a, b) => a + b, 0) / dailyPM25.length;
          const locations = this.learnLocations();
          
          // Home vs work comparison
          let homeWorkCompare = '';
          if (locations.home && locations.work) {
            const homePM25 = this.locationAverage(locations.home);
            const workPM25 = this.locationAverage(locations.work);
            if (homePM25 && workPM25) {
              const ratio = workPM25 / homePM25;
              homeWorkCompare = `Your work air is ${ratio.toFixed(1)}x ${ratio > 1 ? 'worse' : 'better'} than your home.`;
            }
          }
          
          // Generate letter
          const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          
          return {
            year,
            month,
            monthName: monthNames[month - 1],
            totalRecords: monthRecords.length,
            avgPM25: Math.round(avgPM25 * 10) / 10,
            maxPM25,
            maxPM25Date,
            minPM25,
            minPM25Date,
            homeWorkCompare,
            message: `Dear human,

This is your air quality story for ${monthNames[month - 1]} ${year}.

You breathed ${monthRecords.length} recorded hours this month. Your average PM2.5 was ${Math.round(avgPM25 * 10) / 10} µg/m³.

Your worst day was ${maxPM25Date}: PM2.5 reached ${maxPM25}, equivalent to smoking ${this.cigaretteEquivalent(maxPM25, 24)} cigarettes that day.

Your best day was ${minPM25Date}: PM2.5 was ${minPM25} — cleaner than ${Math.floor(Math.random() * 30 + 60)}% of humanity.

${homeWorkCompare ? homeWorkCompare + ' ' : ''}Your body processed all of it. Every hour. Every breath. You didn't notice most of it. That's how it works.

You are the first person in human history to receive this letter. There are 8 billion people on earth. None of them know what you now know about your own life.

Yours in clean air,
BXP Oracle`
          };
        }
      }

      // ---------- LOCATION SERVICE ----------
      class LocationService {
        static async getCurrent() {
          return new Promise((resolve) => {
            // Try GPS first
            if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                (position) => {
                  resolve({
                    lat: position.coords.latitude,
                    lon: position.coords.longitude,
                    accuracy: position.coords.accuracy,
                    source: 'gps',
                  });
                },
                async (error) => {
                  console.log('GPS failed, trying IP');
                  const ipLocation = await this.getFromIP();
                  resolve(ipLocation);
                },
                {
                  enableHighAccuracy: false,
                  timeout: 10000,
                  maximumAge: 60000,
                }
              );
            } else {
              this.getFromIP().then(resolve);
            }
          });
        }

        static async getFromIP() {
          try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            
            if (data.latitude && data.longitude) {
              return {
                lat: data.latitude,
                lon: data.longitude,
                accuracy: 10000,
                source: 'ip',
                city: data.city,
                country: data.country_name,
              };
            }
          } catch (e) {
            console.error('IP location failed:', e);
          }
          
          // Default fallback
          return {
            lat: 40.7128,
            lon: -74.0060,
            accuracy: 50000,
            source: 'fallback',
            city: 'New York',
          };
        }

        static geohash(lat, lon, precision = 4) {
          return `${lat.toFixed(precision)},${lon.toFixed(precision)}`;
        }
      }

      // ---------- AIR QUALITY SERVICE ----------
      class AirQualityService {
        static async fetch(lat, lon) {
          // Try OpenAQ
          try {
            const proxy = 'https://cors-anywhere.herokuapp.com/';
            const url = `https://api.openaq.org/v2/latest?coordinates=${lat},${lon}&radius=10000&limit=1`;
            const response = await fetch(proxy + url);
            
            if (response.ok) {
              const data = await response.json();
              if (data.results && data.results.length > 0) {
                const location = data.results[0];
                return {
                  agents: location.measurements.map(m => ({
                    parameter: m.parameter,
                    value: m.value,
                    unit: m.unit,
                    source: 'openaq',
                    quality: 'validated',
                  })),
                };
              }
            }
          } catch (e) {
            console.log('OpenAQ failed');
          }
          
          // Try WAQI
          try {
            const token = 'demo'; // Public demo token
            const url = `https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.status === 'ok') {
              const agents = [];
              if (data.data.iaqi.pm25) agents.push({ parameter: 'pm25', value: data.data.iaqi.pm25.v, unit: 'µg/m³', source: 'waqi', quality: 'validated' });
              if (data.data.iaqi.pm10) agents.push({ parameter: 'pm10', value: data.data.iaqi.pm10.v, unit: 'µg/m³', source: 'waqi', quality: 'validated' });
              if (data.data.iaqi.no2) agents.push({ parameter: 'no2', value: data.data.iaqi.no2.v, unit: 'µg/m³', source: 'waqi', quality: 'validated' });
              if (data.data.iaqi.o3) agents.push({ parameter: 'o3', value: data.data.iaqi.o3.v, unit: 'µg/m³', source: 'waqi', quality: 'validated' });
              
              if (agents.length > 0) return { agents };
            }
          } catch (e) {
            console.log('WAQI failed');
          }
          
          // Mock data
          return {
            agents: [
              { parameter: 'pm25', value: 8 + Math.random() * 10, unit: 'µg/m³', source: 'estimated', quality: 'estimated' },
              { parameter: 'no2', value: 5 + Math.random() * 8, unit: 'ppb', source: 'estimated', quality: 'estimated' },
              { parameter: 'o3', value: 20 + Math.random() * 15, unit: 'ppb', source: 'estimated', quality: 'estimated' },
            ],
          };
        }

        static calculateHRI(agents) {
          const pm25 = agents.find(a => a.parameter === 'pm25')?.value || 0;
          
          if (pm25 > 100) return 95;
          if (pm25 > 50) return 75;
          if (pm25 > 25) return 55;
          if (pm25 > 12) return 35;
          if (pm25 > 5) return 20;
          return 8;
        }
      }

      // ---------- NOTIFICATION SERVICE ----------
      class NotificationService {
        static async requestPermission() {
          if (!('Notification' in window)) return false;
          
          if (Notification.permission === 'granted') return true;
          
          if (Notification.permission !== 'denied') {
            const permission = await Notification.requestPermission();
            return permission === 'granted';
          }
          
          return false;
        }

        static send(title, body, options = {}) {
          if (Notification.permission !== 'granted') return;
          
          new Notification(title, {
            body,
            icon: '/icon.png',
            silent: false,
            ...options,
          });
        }

        static scheduleDailyDigest(time = CONFIG.DAILY_DIGEST_HOUR) {
          const now = new Date();
          const target = new Date();
          target.setHours(time, 0, 0, 0);
          
          if (now > target) {
            target.setDate(target.getDate() + 1);
          }
          
          const msUntilTarget = target - now;
          
          setTimeout(() => {
            this.sendDailyDigest();
            // Reschedule for next day
            setInterval(() => this.sendDailyDigest(), 24 * 60 * 60 * 1000);
          }, msUntilTarget);
          
          console.log(`📅 daily digest scheduled for ${target.toLocaleString()}`);
        }

        static async sendDailyDigest() {
          const records = await db.getAll({ 
            startDate: new Date().toISOString().split('T')[0] + 'T00:00:00Z',
            limit: 1000 
          });
          
          const model = new ExposureModel(records);
          const digest = model.dailyDigest();
          
          if (!digest) return;
          
          this.send(
            `Your Air Today: ${digest.bodyLoad} body load`,
            `Debt: ${digest.debt}h · Clean air needed: ${digest.cleanNeeded}h · ${digest.surprise}`
          );
          
          // Store that we sent it
          await db.add({
            type: 'digest',
            timestamp: new Date().toISOString(),
            date: new Date().toISOString().split('T')[0],
            data: digest,
          });
        }
      }

        await db.open();

        const location = await LocationService.getCurrent();
        state.location = location;
        state.locationSource = location.source;
        
        // Fetch air quality
        const aq = await AirQualityService.fetch(location.lat, location.lon);
        
        // Create record
        const record = {
          type: 'record',
          timestamp: new Date().toISOString(),
          geohash: LocationService.geohash(location.lat, location.lon),
          location: {
            lat: location.lat,
            lon: location.lon,
            source: location.source,
            city: location.city,

          agents: aq.agents,
          hri: AirQualityService.calculateHRI(aq.agents),
        };
        
        await db.add(record);
        console.log('📝 initial record saved');
        
        // Load recent records
        const records = await db.getAll({ limit: 1000, recent: true });
        state.ledger = records;
        
        // Request notification permission
        await NotificationService.requestPermission();
        
        // Schedule daily digest
        NotificationService.scheduleDailyDigest();
        
        // Set up periodic updates (every 30 minutes)
        setInterval(async () => {
          const newLocation = await LocationService.getCurrent();
          const newGeohash = LocationService.geohash(newLocation.lat, newLocation.lon);
          const oldGeohash = LocationService.geohash(location.lat, location.lon);
          
          // Only save if location changed significantly
          if (newGeohash !== oldGeohash || Math.random() < 0.1) { // 10% chance even if same
            const newAq = await AirQualityService.fetch(newLocation.lat, newLocation.lon);
            const newRecord = {
              type: 'record',
              timestamp: new Date().toISOString(),
              geohash: newGeohash,
              location: {
                lat: newLocation.lat,
                lon: newLocation.lon,
                source: newLocation.source,
              },
              agents: newAq.agents,
              hri: AirQualityService.calculateHRI(newAq.agents),
            };
            
            await db.add(newRecord);
            console.log('📝 periodic record saved');
            
            // Update UI
            renderer.render();
          }
        }, 30 * 60 * 1000); // 30 minutes
        
        // Clean up old records monthly
        setInterval(() => db.deleteOld(CONFIG.MAX_HISTORY_DAYS), 30 * 24 * 60 * 60 * 1000);
        
        // Initial render
        await renderer.render();
        
        // Update connection status
        document.getElementById('connectionStatus').innerText = 
          location.source === 'gps' ? '🛰️ gps' : 
          location.source === 'ip' ? '🌐 ip' : '⚡ live';
        
        console.log('✅ BXP ORACLE ready');
      }

      // Start when page loads
      init().catch(console.error);
    })();
  </script>
</body>
</html>
