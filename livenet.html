<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#080b12">
<meta name="description" content="A personal cryptographic ledger of every environment you breathe through.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BXP LiveNet">
<meta property="og:title" content="BXP LiveNet">
<meta property="og:description" content="For the first time ever — you can prove what you breathed.">
<meta property="og:url" content="https://bxpprotocol.github.io/livenet.html">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>BXP LiveNet</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080b12;--bg2:#0d1120;--sf:#0f1622;--s2:#141d2e;
  --bd:#1a2740;--txt:#dde4f0;--mu:#3d506e;--m2:#6b7fa0;
  --ac:#00ff88;--a2:#00c8ff;--wa:#ffaa00;--da:#ff4466;
  --sans:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--sans);}
#app{display:grid;height:100vh;width:100%;grid-template-rows:52px 1fr auto;grid-template-columns:1fr;grid-template-areas:"topbar" "main" "nav";}
@media(min-width:900px){#app{grid-template-rows:56px 1fr;grid-template-columns:240px 1fr;grid-template-areas:"topbar topbar" "sidebar main";max-width:1400px;margin:0 auto;border-left:1px solid var(--bd);border-right:1px solid var(--bd);}#nav{display:none!important;}#sidebar{display:flex!important;}}
#topbar{grid-area:topbar;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;border-bottom:1px solid var(--bd);background:rgba(8,11,18,.97);backdrop-filter:blur(24px);z-index:50;}
.logo{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.12em;color:var(--ac);}
.topbar-right{display:flex;align-items:center;gap:.875rem;}
.status-pill{display:flex;align-items:center;gap:.375rem;font-family:var(--mono);font-size:.58rem;color:var(--m2);padding:.3rem .7rem;border:1px solid var(--bd);border-radius:999px;background:var(--bg2);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:sd 2s infinite;flex-shrink:0;}
.sdot.off{background:var(--mu);animation:none}.sdot.err{background:var(--da);animation:none}
@keyframes sd{0%,100%{opacity:1}50%{opacity:.2}}
.hbtn{background:none;border:1px solid var(--bd);border-radius:7px;color:var(--m2);padding:.3rem .55rem;font-size:.9rem;cursor:pointer;transition:color .15s,border-color .15s;}
.hbtn:hover{color:var(--ac);border-color:var(--ac)}.hbtn.spin{animation:hspin .6s linear}
@keyframes hspin{to{transform:rotate(360deg)}}
#sidebar{grid-area:sidebar;display:none;flex-direction:column;border-right:1px solid var(--bd);padding:1.25rem 0;overflow:hidden;}
.snav{display:flex;flex-direction:column;gap:.2rem;padding:0 .75rem;}
.sni{display:flex;align-items:center;gap:.75rem;padding:.7rem .9rem;border-radius:8px;border:none;background:none;color:var(--m2);width:100%;text-align:left;cursor:pointer;transition:background .15s,color .15s;font-family:var(--sans);}
.sni:hover{background:var(--bg2);color:var(--txt)}.sni.act{background:rgba(0,255,136,.07);color:var(--ac)}
.sni-ic{font-size:1rem;flex-shrink:0;width:1.25rem;text-align:center;}.sni-lb{font-family:var(--mono);font-size:.63rem;letter-spacing:.04em;text-transform:uppercase;}
.sidebar-foot{margin-top:auto;padding:.875rem .75rem;border-top:1px solid var(--bd);}.sf-stat{font-family:var(--mono);font-size:.6rem;color:var(--mu);line-height:1.8;}.sf-stat strong{color:var(--m2);display:block;}
#main{grid-area:main;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;}
#nav{grid-area:nav;display:flex;border-top:1px solid var(--bd);background:rgba(8,11,18,.97);backdrop-filter:blur(24px);z-index:50;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.5rem .25rem calc(.5rem + env(safe-area-inset-bottom));border:none;background:none;color:var(--mu);cursor:pointer;}
.bni.act{color:var(--ac)}.bni-ic{font-size:1.1rem;}.bni-lb{font-family:var(--mono);font-size:.5rem;letter-spacing:.04em;text-transform:uppercase;}
.scr{display:none;padding:1.5rem;animation:fup .2s ease both;}.scr.act{display:block;}
@media(min-width:900px){.scr{padding:2rem 2.5rem;}}
@keyframes fup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
#scr-entry{display:flex!important;min-height:calc(100vh - 52px);align-items:center;justify-content:center;text-align:center;padding:2rem;}
@media(min-width:900px){#scr-entry{min-height:calc(100vh - 56px);}}
.entry-inner{max-width:320px;}
.entry-title{font-family:var(--serif);font-size:clamp(2.4rem,6vw,4rem);line-height:1.05;font-weight:400;margin-bottom:2rem;letter-spacing:-.01em;}
.entry-title em{font-style:italic;color:var(--m2);}
.entry-cta{padding:.95rem 2.75rem;background:var(--ac);color:#080b12;border:none;border-radius:10px;font-family:var(--sans);font-size:1rem;font-weight:800;cursor:pointer;transition:opacity .15s,transform .1s;}
.entry-cta:hover{opacity:.88}.entry-cta:active{transform:scale(.97)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:.875rem;}
@media(min-width:900px){.card{border-radius:14px;margin-bottom:1rem;}}
.cp{padding:1.25rem;}@media(min-width:900px){.cp{padding:1.5rem;}}
.ey{font-family:var(--mono);font-size:.57rem;letter-spacing:.15em;color:var(--m2);text-transform:uppercase;margin-bottom:.625rem;}
.ct{font-size:.9rem;font-weight:700;margin-bottom:.375rem;}.cb{font-size:.78rem;color:var(--m2);line-height:1.75;}.cb strong{color:var(--txt);}.div{height:1px;background:var(--bd);}
@media(min-width:900px){.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}.g2>.card{margin-bottom:0;}.g2>.full{grid-column:1/-1;}}
.bl-wrap{display:flex;align-items:center;gap:1.5rem;padding:1.25rem;}
@media(max-width:899px){.bl-wrap{flex-direction:column;align-items:center;text-align:center;padding:1.5rem 1.25rem;}}
.bl-ring{position:relative;width:120px;height:120px;flex-shrink:0;}.bl-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.bl-tr{fill:none;stroke:var(--bd);stroke-width:7;}.bl-fi{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1.8s cubic-bezier(.16,1,.3,1),stroke .5s;}
.bl-cen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.bl-num{font-family:var(--mono);font-size:1.9rem;font-weight:700;line-height:1;}.bl-sub{font-family:var(--mono);font-size:.5rem;color:var(--m2);letter-spacing:.1em;margin-top:.15rem;}
.hri-row{display:flex;align-items:flex-end;gap:.875rem;margin-bottom:.875rem;}.hri-n{font-family:var(--mono);font-size:3rem;font-weight:700;line-height:1;}
.hri-badge{display:inline-block;font-family:var(--mono);font-size:.6rem;font-weight:700;letter-spacing:.08em;padding:.18rem .55rem;border-radius:999px;margin-bottom:.3rem;}
.hri-adv{font-size:.73rem;color:var(--m2);line-height:1.5;}.bar-t{height:3px;background:var(--bd);border-radius:999px;overflow:hidden;margin-bottom:.875rem;}.bar-f{height:100%;border-radius:999px;transition:width 1s ease;}
.ags{display:grid;grid-template-columns:repeat(3,1fr);gap:.375rem;}@media(min-width:900px){.ags{grid-template-columns:repeat(6,1fr);}}
.ag{background:var(--bg2);border-radius:7px;padding:.5rem;text-align:center;}.ag-id{font-family:var(--mono);font-size:.5rem;color:var(--m2);margin-bottom:.12rem;}.ag-v{font-family:var(--mono);font-size:.85rem;font-weight:700;}.ag-p{font-family:var(--mono);font-size:.46rem;color:var(--mu);margin-top:.1rem;}
.loc-row{display:flex;align-items:center;gap:.5rem;margin-top:.875rem;padding-top:.875rem;border-top:1px solid var(--bd);}.loc-n{font-size:.78rem;font-weight:600;}.loc-s{font-family:var(--mono);font-size:.58rem;color:var(--m2);}
.bud-gauge{height:6px;background:var(--bd);border-radius:999px;overflow:hidden;margin:.75rem 0;}.bud-fill{height:100%;border-radius:999px;transition:width .9s ease;}
.bud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;}.bs{background:var(--bg2);border-radius:8px;padding:.6rem;text-align:center;}.bs-n{font-family:var(--mono);font-size:1.05rem;font-weight:700;display:block;margin-bottom:.15rem;}.bs-l{font-family:var(--mono);font-size:.48rem;color:var(--m2);text-transform:uppercase;letter-spacing:.05em;}
.ps-list{display:flex;flex-direction:column;gap:.45rem;margin-top:.625rem;}.ps-row{display:flex;gap:.75rem;align-items:flex-start;padding:.625rem .75rem;background:var(--bg2);border-radius:8px;}.ps-arr{font-family:var(--mono);font-size:.68rem;color:var(--ac);flex-shrink:0;margin-top:2px;}.ps-t{font-size:.77rem;color:var(--txt);line-height:1.55;}.ps-t span{color:var(--m2);}
.zone-list{display:flex;flex-direction:column;gap:.35rem;margin-top:.5rem;}.zone-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;background:var(--bg2);border-radius:8px;}.zone-ic{font-size:.95rem;flex-shrink:0;}.zone-n{font-size:.77rem;font-weight:600;}.zone-s{font-family:var(--mono);font-size:.56rem;color:var(--m2);}.zone-hri{font-family:var(--mono);font-size:.78rem;font-weight:700;margin-left:auto;}
.dig-hrs{display:grid;grid-template-columns:repeat(4,1fr);gap:.375rem;margin-bottom:.875rem;}.dh{text-align:center;padding:.5rem .2rem;border-radius:7px;background:var(--bg2);}.dh-v{font-family:var(--mono);font-size:.95rem;font-weight:700;}.dh-l{font-family:var(--mono);font-size:.48rem;color:var(--m2);margin-top:.12rem;}
.mom-row{display:flex;gap:.6rem;padding:.55rem 0;border-bottom:1px solid var(--bd);}.mom-row:last-child{border-bottom:none}.mom-t{font-family:var(--mono);font-size:.56rem;color:var(--m2);min-width:36px;flex-shrink:0;margin-top:2px;}.mom-tx{font-size:.74rem;color:var(--txt);line-height:1.55;}.mom-tx span{color:var(--m2);}
.let-to{font-family:var(--mono);font-size:.56rem;color:var(--m2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;}.let-sub{font-family:var(--serif);font-size:clamp(1.1rem,3vw,1.5rem);line-height:1.25;font-weight:400;margin-bottom:1rem;}.let-body{font-size:.8rem;color:var(--m2);line-height:1.9;}.let-body p{margin-bottom:.875rem;}.let-body p:last-child{margin-bottom:0}.let-body strong{color:var(--txt);}.let-sig{font-family:var(--mono);font-size:.57rem;color:var(--mu);line-height:1.8;margin-top:1rem;padding-top:.875rem;border-top:1px solid var(--bd);}
.led-list{display:flex;flex-direction:column;gap:.3rem;}@media(min-width:900px){.led-list{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}}
.li{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:.7rem .875rem;display:flex;align-items:center;gap:.7rem;}.li-sc{font-family:var(--mono);font-size:.9rem;font-weight:700;min-width:28px;text-align:center;}.li-in{flex:1;min-width:0;}.li-lc{font-size:.77rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.1rem;}.li-mt{font-family:var(--mono);font-size:.52rem;color:var(--mu);display:flex;gap:.6rem;flex-wrap:wrap;}.li-bd{font-family:var(--mono);font-size:.52rem;font-weight:700;padding:.12rem .38rem;border-radius:999px;white-space:nowrap;flex-shrink:0;}
.le{background:var(--sf);border:1px solid rgba(255,68,102,.3);border-left:3px solid var(--da);border-radius:12px;padding:1.125rem;margin-bottom:.875rem;}.le-tit{font-size:.875rem;font-weight:700;color:var(--da);margin-bottom:.375rem;}.le-bod{font-size:.74rem;color:var(--m2);line-height:1.7;margin-bottom:.75rem;}.le-st{display:flex;flex-direction:column;gap:.32rem;margin-bottom:.75rem;}.le-s{display:flex;gap:.5rem;font-size:.72rem;color:var(--txt);}.le-sn{font-family:var(--mono);font-size:.58rem;color:var(--ac);flex-shrink:0;margin-top:1px;}.retry{width:100%;padding:.68rem;background:transparent;border:1px solid var(--da);color:var(--da);border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:700;cursor:pointer;}
.np{background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.14);border-radius:12px;padding:1rem;display:flex;gap:.75rem;align-items:flex-start;margin-bottom:.875rem;}.np-t{font-size:.8rem;font-weight:700;margin-bottom:.18rem;}.np-b{font-size:.7rem;color:var(--m2);line-height:1.55;margin-bottom:.5rem;}.np-btn{padding:.42rem .875rem;background:var(--ac);color:#080b12;border:none;border-radius:7px;font-family:var(--sans);font-size:.73rem;font-weight:800;cursor:pointer;}
.anom{background:rgba(255,68,102,.05);border:1px solid rgba(255,68,102,.22);border-left:3px solid var(--da);margin-bottom:.875rem;}
.share-warn{background:rgba(255,170,0,.05);border:1px solid rgba(255,170,0,.18);border-radius:10px;padding:.875rem 1rem;margin-bottom:1rem;font-size:.76rem;color:var(--m2);line-height:1.65;}.share-warn strong{color:var(--wa);}
.share-opts{display:flex;flex-direction:column;gap:.625rem;}.sopt{display:flex;align-items:center;gap:1rem;padding:1rem 1.125rem;background:var(--sf);border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:border-color .15s;}.sopt:hover{border-color:var(--m2);}.sopt-ic{font-size:1.2rem;flex-shrink:0;width:1.5rem;text-align:center;}.sopt-inf{flex:1;}.sopt-t{font-size:.83rem;font-weight:700;margin-bottom:.15rem;}.sopt-d{font-size:.7rem;color:var(--m2);}.sopt-arr{color:var(--mu);font-size:.8rem;}
.mlov{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;z-index:400;padding:1.5rem;}.mlov.show{display:flex;}.modal{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:1.5rem;width:100%;max-width:360px;}.modal h3{font-size:.9rem;font-weight:700;margin-bottom:.4rem;}.modal-b{font-size:.76rem;color:var(--m2);line-height:1.65;margin-bottom:1rem;}.modal-prev{background:var(--bg);border-radius:8px;padding:.875rem;font-family:var(--mono);font-size:.63rem;color:var(--m2);line-height:1.7;margin-bottom:1rem;border:1px solid var(--bd);white-space:pre-wrap;word-break:break-word;}.modal-acts{display:flex;gap:.625rem;}.m-cancel{flex:1;padding:.7rem;background:transparent;border:1px solid var(--bd);color:var(--m2);border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer;}.m-confirm{flex:1;padding:.7rem;background:var(--ac);color:#080b12;border:none;border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:800;cursor:pointer;}.qr-inner{text-align:center;}.qr-url{font-family:var(--mono);font-size:.58rem;color:var(--a2);word-break:break-all;margin:.75rem 0;}.m-close{width:100%;padding:.7rem;background:var(--bg2);border:1px solid var(--bd);color:var(--txt);border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer;}
.lov{position:fixed;inset:0;background:rgba(8,11,18,.92);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:.875rem;}.lov.show{display:flex;}.ldr{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:lsp .75s linear infinite;}@keyframes lsp{to{transform:rotate(360deg)}}.ldr-t{font-family:var(--mono);font-size:.63rem;color:var(--m2);}
.toast{position:fixed;bottom:calc(52px + 10px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:.575rem 1.125rem;font-family:var(--mono);font-size:.65rem;color:var(--txt);white-space:nowrap;opacity:0;transition:all .22s;z-index:300;pointer-events:none;}@media(min-width:900px){.toast{bottom:1.25rem;}}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sec-btn{width:100%;padding:.78rem;background:transparent;border:1px solid var(--bd);color:var(--m2);border-radius:9px;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s;margin-top:.5rem;}.sec-btn:hover{border-color:var(--m2);}.sec-btn.ac-btn{border-color:rgba(0,255,136,.25);color:var(--ac);}.sec-btn.ac-btn:hover{border-color:var(--ac);}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="logo">BXP LIVENET</div>
    <div class="topbar-right">
      <div class="status-pill"><div class="sdot off" id="sdot"></div><span id="stext">—</span></div>
      <button class="hbtn" id="rbtn" onclick="manualRead()" title="Refresh">↻</button>
    </div>
  </header>
  <aside id="sidebar">
    <nav class="snav">
      <button class="sni act" onclick="go('now',this)"><span class="sni-ic">◎</span><span class="sni-lb">Now</span></button>
      <button class="sni" onclick="go('ledger',this)"><span class="sni-ic">⛓</span><span class="sni-lb">Ledger</span></button>
      <button class="sni" onclick="go('passport',this)"><span class="sni-ic">⬡</span><span class="sni-lb">Passport</span></button>
      <button class="sni" onclick="go('share',this)"><span class="sni-ic">↗</span><span class="sni-lb">Share</span></button>
    </nav>
    <div class="sidebar-foot"><div class="sf-stat"><strong>BXP Ledger</strong><span id="sb-cnt">0 records</span><br><span id="sb-chain" style="color:var(--ac)">Chain: verified</span></div></div>
  </aside>
  <main id="main">
    <div id="scr-entry" class="scr">
      <div class="entry-inner">
        <h1 class="entry-title">Every breath.<br><em>Recorded.</em></h1>
        <button class="entry-cta" onclick="startApp()">Begin</button>
      </div>
    </div>
    <div id="scr-now" class="scr"><div id="cn"></div></div>
    <div id="scr-ledger" class="scr"><div id="cl"></div></div>
    <div id="scr-passport" class="scr"><div id="cpp"></div></div>
    <div id="scr-share" class="scr"><div id="csh"></div></div>
  </main>
  <nav id="nav">
    <button class="bni act" onclick="go('now',this)"><span class="bni-ic">◎</span><span class="bni-lb">Now</span></button>
    <button class="bni" onclick="go('ledger',this)"><span class="bni-ic">⛓</span><span class="bni-lb">Ledger</span></button>
    <button class="bni" onclick="go('passport',this)"><span class="bni-ic">⬡</span><span class="bni-lb">Passport</span></button>
    <button class="bni" onclick="go('share',this)"><span class="bni-ic">↗</span><span class="bni-lb">Share</span></button>
  </nav>
</div>
<div class="lov" id="lov"><div class="ldr"></div><div class="ldr-t" id="ltxt">—</div></div>
<div class="toast" id="tst"></div>
<div class="mlov" id="sm"><div class="modal"><h3 id="sm-title">—</h3><div class="modal-b" id="sm-body"></div><div class="modal-prev" id="sm-prev"></div><div class="modal-acts"><button class="m-cancel" onclick="closeSM()">Cancel</button><button class="m-confirm" id="sm-ok">Send</button></div></div></div>
<div class="mlov" id="qrm"><div class="modal qr-inner"><h3>Scan to open BXP</h3><p style="font-size:.74rem;color:var(--m2);margin-top:.25rem">Opens the app — not your personal data.</p><div id="qrbox" style="background:#fff;border-radius:8px;padding:.875rem;display:inline-block;margin:1rem 0;"></div><div class="qr-url">bxpprotocol.github.io/livenet.html</div><button class="m-close" onclick="document.getElementById('qrm').classList.remove('show')">Close</button></div></div>
<script src="/db.js"></script>
<script src="/app.js"></script>
</body>
</html>
